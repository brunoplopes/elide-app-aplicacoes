<section class="auth-lite">
  <div>
    <span>Recuperacao segura</span>
    <h1>Esqueci minha senha</h1>
    <p>Informe seu e-mail ou usuario para receber um codigo temporario de recuperacao.</p>
  </div>
  <form class="elide-form-card" [formGroup]="page.form" (ngSubmit)="page.submit()">
    <h2>Recuperar acesso</h2>
    <p>Receba um codigo temporario.</p>
    <mat-form-field appearance="outline"><mat-label>E-mail ou usuario</mat-label><input matInput formControlName="identifier"></mat-form-field>
    <button mat-flat-button type="submit" [disabled]="page.loading() || page.form.invalid">
      {{ page.loading() ? 'Enviando...' : 'Enviar codigo' }}
    </button>
    @if (page.message()) { <p class="api-message">{{ page.message() }}</p> }
    <a mat-button routerLink="/login">Voltar ao login</a>
  </form>
</section>
