<section class="password-page">
  <elide-client-heading title="Alterar senha" description="Atualize sua senha periodicamente para manter sua conta ELIDE segura." />
  <form class="elide-form-card" [formGroup]="page.form">
    <h2>Nova senha</h2>
    <p>Use uma senha forte e exclusiva.</p>
    <mat-form-field appearance="outline"><mat-label>Senha atual</mat-label><input matInput type="password" formControlName="currentPassword"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Nova senha</mat-label><input matInput type="password" formControlName="newPassword"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Confirmar nova senha</mat-label><input matInput type="password" formControlName="confirmPassword"></mat-form-field>
    <button mat-flat-button type="button">Atualizar senha</button>
  </form>
</section>
