services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: elide-postgres
    environment:
      POSTGRES_DB: elide
      POSTGRES_USER: elide
      POSTGRES_PASSWORD: elide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elide -d elide"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elide-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: elide-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: elide
      RABBITMQ_DEFAULT_PASS: elide
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ./backend
    container_name: elide-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: elide
      DB_USER: elide
      DB_PASSWORD: elide
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: "change-this-local-development-secret-with-at-least-64-characters"
      ELIDE_BOOTSTRAP_ADMIN_USERNAME: leonardo_admin
      ELIDE_BOOTSTRAP_ADMIN_PASSWORD: elide.com.leo.2026
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: elide-frontend
    environment:
      API_URL: http://localhost:8080
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
