<section class="admin-page">
  <elide-client-heading eyebrow="Administrador" title="CRUD de banners" description="Controle campanhas e destaques da home." />
  @if (page.message()) { <p class="api-message">{{ page.message() }}</p> }

  <section class="panel">
    <div class="panel-heading"><h2>Banners</h2><button mat-button type="button" (click)="page.resetBanner()">Limpar</button></div>
    <form class="admin-form dense" [formGroup]="page.bannerForm" (ngSubmit)="page.saveBanner()">
      <mat-form-field appearance="outline"><mat-label>Titulo</mat-label><input matInput formControlName="title"></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Imagem</mat-label><input matInput formControlName="imageUrl"></mat-form-field>
      <label class="check-line"><input type="checkbox" formControlName="active"> Ativo</label>
      <button mat-flat-button color="primary" type="submit">{{ page.editingBannerId() ? 'Atualizar banner' : 'Criar banner' }}</button>
    </form>
    <div class="record-list">
      @for (banner of page.banners(); track banner.id) {
        <div class="record-row"><span><strong>{{ banner.title }}</strong><small>{{ banner.imageUrl }} - {{ banner.active ? 'Ativo' : 'Inativo' }}</small></span><div><button mat-button type="button" (click)="page.editBanner(banner)">Editar</button><button mat-button type="button" (click)="page.deleteBanner(banner.id)">Excluir</button></div></div>
      } @empty {
        <div class="row-line"><strong>Sem banners</strong><span>Nenhum registro retornado.</span></div>
      }
    </div>
  </section>
</section>
