<section class="elide-section">
  <elide-client-heading title="Avaliacoes" description="Avalie pedidos, lojas e entregadores para melhorar a experiencia da cidade." />
  @if (page.message()) { <p class="api-message">{{ page.message() }}</p> }
  <div class="review-grid">
    @for (order of page.orders(); track order.id) {
      <article class="review-card">
        <h2>{{ page.shortId(order.id) }}</h2>
        <p>{{ order.status }}</p>
        <div class="stars">@for (star of page.stars; track star) { <mat-icon>star</mat-icon> }</div>
        <mat-form-field appearance="outline"><mat-label>Comentario</mat-label><textarea matInput rows="3"></textarea></mat-form-field>
        <button mat-flat-button type="button" (click)="page.send(order)">Enviar avaliacao</button>
      </article>
    } @empty {
      <article class="review-card">
        <h2>Nenhum pedido</h2>
        <p>Pedidos retornados por /orders/mine aparecerao aqui.</p>
      </article>
    }
  </div>
</section>
